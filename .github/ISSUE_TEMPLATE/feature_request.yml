name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe it clearly and we'll consider it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: I always have to do X manually, it would be better if...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      placeholder: A clear description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any other approaches you've thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Source system / YAML config
        - Download engine
        - UI / UX
        - Library tracker
        - Settings
        - Documentation
        - Other
    validations:
      required: true
